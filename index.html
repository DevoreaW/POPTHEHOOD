<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="PopTheHood — Free AI-powered car diagnostic tool. Describe your car symptoms and get instant analysis. Not a replacement for a certified mechanic." />
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PopTheHood" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>PopTheHood — AI Car Diagnostic</title>

    <style>
      body {
        font-family: 'Open Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #030712;
        color: #f1f5f9;
        font-size: 16px;
      }

      /* Skip navigation link for screen readers */
      .skip-nav {
        position: absolute;
        top: -100%;
        left: 0;
        background: #f97316;
        color: white;
        padding: 8px 16px;
        font-weight: bold;
        z-index: 9999;
        text-decoration: none;
        border-radius: 0 0 8px 0;
      }
      .skip-nav:focus {
        top: 0;
      }

      /* Ensure focus rings are always visible */
      *:focus-visible {
        outline: 3px solid #f97316 !important;
        outline-offset: 2px !important;
      }

      /* Minimum touch target size for mobile (44x44px per WCAG) */
      button, select, input, a {
        min-height: 44px;
        font-style: normal !important;
      }

      /* Reduce motion for users who prefer it */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>

    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <!-- Skip navigation for screen readers -->
    <a href="#main-content" class="skip-nav">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
