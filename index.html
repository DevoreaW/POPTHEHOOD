<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <meta name="description" content="PopTheHood — Free AI-powered car diagnostic tool. Describe your car symptoms and get instant analysis. Not a replacement for a certified mechanic." />
    <title>POPTHEHOOD — AI Car Diagnostic Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #030712;
        color: #f1f5f9;
        font-size: 16px;
      }

      /* Skip navigation link for screen readers */
      .skip-nav {
        position: absolute;
        top: -100%;
        left: 0;
        background: #f97316;
        color: white;
        padding: 8px 16px;
        font-weight: bold;
        z-index: 9999;
        text-decoration: none;
        border-radius: 0 0 8px 0;
      }
      .skip-nav:focus {
        top: 0;
      }

      /* Ensure focus rings are always visible */
      *:focus-visible {
        outline: 3px solid #f97316 !important;
        outline-offset: 2px !important;
      }

      /* Minimum touch target size for mobile (44x44px per WCAG) */
      button, select, input, a {
        min-height: 44px;
      }

      /* Reduce motion for users who prefer it */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <!-- Skip navigation for screen readers -->
    <a href="#main-content" class="skip-nav">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
